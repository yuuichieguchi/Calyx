name: Calyx
options:
  bundleIdPrefix: com.calyx
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    OTHER_LDFLAGS:
      - -framework Metal
      - -framework MetalKit
      - -framework QuartzCore
      - -framework CoreGraphics
      - -framework Foundation
      - -framework IOKit
      - -framework CoreText
      - -lz
      - -lc++
    SWIFT_ACTIVE_COMPILATION_CONDITIONS:
      - DEBUG

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"

targets:
  Calyx:
    type: application
    platform: macOS
    sources:
      - path: Calyx
        excludes:
          - "**/*.entitlements"
    postBuildScripts:
      - script: |
          cp -R "${PROJECT_DIR}/Resources/ghostty" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/ghostty"
          cp -R "${PROJECT_DIR}/Resources/terminfo" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/terminfo"
        name: Copy Ghostty Resources
      - script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin"
          cp "${BUILT_PRODUCTS_DIR}/calyx" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin/calyx"
        name: Bundle CalyxCLI
    info:
      path: Calyx/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSPrincipalClass: NSApplication
        SUFeedURL: https://yuuichieguchi.github.io/Calyx/appcast.xml
        SUPublicEDKey: PCj8Kd8fh5sr8y4hhYbT7ER9hDOHUMLFRl9FBSzad2U=
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calyx.terminal
        PRODUCT_NAME: Calyx
        MARKETING_VERSION: "0.8.2"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_ENTITLEMENTS: Calyx/Calyx.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
      - sdk: WebKit.framework
      - sdk: UserNotifications.framework
      - package: Sparkle
      - target: CalyxCLI
        embed: false

  CalyxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CalyxTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Calyx

  CalyxUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: CalyxUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Calyx
    dependencies:
      - target: Calyx

  CalyxCLI:
    type: tool
    platform: macOS
    sources:
      - path: CalyxCLI
    settings:
      base:
        PRODUCT_NAME: calyx
        SWIFT_VERSION: "6.2"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
    dependencies:
      - package: swift-argument-parser
        product: ArgumentParser

fileGroups:
  - Calyx-Bridging-Header.h
