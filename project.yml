name: Calyx
options:
  bundleIdPrefix: com.calyx
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    OTHER_LDFLAGS:
      - -framework Metal
      - -framework MetalKit
      - -framework QuartzCore
      - -framework CoreGraphics
      - -framework Foundation
      - -framework IOKit
      - -framework CoreText
      - -lz
      - -lc++
    SWIFT_ACTIVE_COMPILATION_CONDITIONS:
      - DEBUG

targets:
  Calyx:
    type: application
    platform: macOS
    sources:
      - path: Calyx
        excludes:
          - "**/*.entitlements"
    postBuildScripts:
      - script: |
          cp -R "${PROJECT_DIR}/Resources/ghostty" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/ghostty"
          cp -R "${PROJECT_DIR}/Resources/terminfo" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/terminfo"
        name: Copy Ghostty Resources
    info:
      path: Calyx/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calyx.terminal
        PRODUCT_NAME: Calyx
        MARKETING_VERSION: "0.3.4"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_ENTITLEMENTS: Calyx/Calyx.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
      - sdk: WebKit.framework
      - sdk: UserNotifications.framework

  CalyxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CalyxTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Calyx

  CalyxUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: CalyxUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Calyx
    dependencies:
      - target: Calyx

fileGroups:
  - Calyx-Bridging-Header.h
