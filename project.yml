name: Calyx
options:
  bundleIdPrefix: com.calyx
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# DebugUITesting is a debug-type config used ONLY by the CalyxUITests
# scheme's test action (see schemes.CalyxUITests.test.config below), so
# the Calyx.app built for UI testing gets an isolated
# PRODUCT_BUNDLE_IDENTIFIER (com.calyx.terminal.e2e, set below on the
# Calyx target) distinct from the production com.calyx.terminal used by
# every other config. This prevents LaunchServices from ever conflating
# a locally-installed production Calyx.app with the UI-test-built one,
# which previously let XCUITest keystrokes leak into whichever app
# LaunchServices considered the "real" com.calyx.terminal.
configs:
  Debug: debug
  Release: release
  DebugUITesting: debug

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    OTHER_LDFLAGS:
      - -framework Metal
      - -framework MetalKit
      - -framework QuartzCore
      - -framework CoreGraphics
      - -framework Foundation
      - -framework IOKit
      - -framework CoreText
      - -lz
      - -lc++
  configs:
    debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS:
        - DEBUG

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"

targets:
  Calyx:
    type: application
    platform: macOS
    sources:
      - path: Calyx
        excludes:
          - "**/*.entitlements"
    postBuildScripts:
      - script: |
          cp -R "${PROJECT_DIR}/Resources/ghostty" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/ghostty"
          cp -R "${PROJECT_DIR}/Resources/terminfo" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/terminfo"
        name: Copy Ghostty Resources
      - script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin"
          # rm before cp: same stale-code-signature-cache SIGKILL risk as the Bundle Session Daemon script below.
          rm -f "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin/calyx"
          cp "${BUILT_PRODUCTS_DIR}/calyx" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin/calyx"
        name: Bundle CalyxCLI
      - script: |
          set -e
          SESSION_BIN="${PROJECT_DIR}/build/session/calyx-session"
          if [ -f "$SESSION_BIN" ]; then
            mkdir -p "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin"
            # rm before cp: overwriting the same inode in place leaves the
            # kernel's code-signature cache stale for a binary that has
            # already been executed, and every later exec of it dies with
            # SIGKILL (field-verified: exit 137 at the bundle path, same
            # bytes run fine after an rm+cp re-copy created a fresh inode).
            rm -f "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin/calyx-session"
            cp "$SESSION_BIN" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin/calyx-session"
            chmod 0755 "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin/calyx-session"
          elif [ "${CONFIGURATION}" = "Debug" ]; then
            echo "warning: build/session/calyx-session not found — run scripts/build-session.sh to enable persistent sessions in this Debug build. Skipping (feature stays gated off)."
          else
            echo "error: build/session/calyx-session not found for a ${CONFIGURATION} build. Run scripts/build-session.sh before building Release."
            exit 1
          fi
        name: Bundle Session Daemon
    info:
      path: Calyx/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSPrincipalClass: NSApplication
        SUFeedURL: https://yuuichieguchi.github.io/Calyx/appcast.xml
        SUPublicEDKey: PCj8Kd8fh5sr8y4hhYbT7ER9hDOHUMLFRl9FBSzad2U=
        CFBundleDocumentTypes:
          - CFBundleTypeName: Folder
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.folder
        NSServices:
          - NSMenuItem:
              default: Open in Calyx
            NSMessage: openInCalyx
            NSPortName: Calyx
            NSRequiredContext:
              NSTextContent: FilePath
            NSSendTypes:
              - NSFilenamesPboardType
              - public.plain-text
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calyx.terminal
        PRODUCT_NAME: Calyx
        MARKETING_VERSION: "0.28.0"
        CURRENT_PROJECT_VERSION: 50
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_ENTITLEMENTS: Calyx/Calyx.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
        debuguitesting:
          # Exact-match key (case-insensitive) against the "DebugUITesting"
          # config name — applies ONLY to that config, not to Debug/Release.
          PRODUCT_BUNDLE_IDENTIFIER: com.calyx.terminal.e2e
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
      - sdk: WebKit.framework
      - sdk: UserNotifications.framework
      - package: Sparkle
      - target: CalyxCLI
        embed: false

  CalyxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CalyxTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Calyx

  CalyxUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: CalyxUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Calyx
    dependencies:
      - target: Calyx

  CalyxCLI:
    type: tool
    platform: macOS
    sources:
      - path: CalyxCLI
    settings:
      base:
        PRODUCT_NAME: calyx
        PRODUCT_MODULE_NAME: CalyxCLI
        SWIFT_VERSION: "6.2"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
    dependencies:
      - package: swift-argument-parser
        product: ArgumentParser

schemes:
  Calyx:
    build:
      targets:
        Calyx: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        # CalyxUITests is deliberately excluded here: this scheme's test
        # action only has one shared `config` for all listed targets, and
        # that config (Debug) builds the app-under-test with the
        # production PRODUCT_BUNDLE_IDENTIFIER. Running UI tests through
        # this scheme would silently reintroduce the bundle-ID collision
        # that the isolated `CalyxUITests` scheme (test.config:
        # DebugUITesting) exists to prevent. Use the CalyxUITests scheme
        # directly for UI tests.
        - CalyxTests
  CalyxTests:
    build:
      targets:
        Calyx: [run, test]
        CalyxTests: test
    test:
      config: Debug
      targets:
        - CalyxTests
  CalyxUITests:
    build:
      targets:
        Calyx: [run, test]
        CalyxUITests: test
    test:
      # Builds the Calyx app-under-test with PRODUCT_BUNDLE_IDENTIFIER
      # com.calyx.terminal.e2e (see the DebugUITesting config above),
      # isolating it from the production com.calyx.terminal bundle ID.
      config: DebugUITesting
      targets:
        - CalyxUITests

fileGroups:
  - Calyx-Bridging-Header.h
