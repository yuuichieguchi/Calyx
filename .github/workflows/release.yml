name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig 0.14.1
        run: |
          curl -L https://ziglang.org/download/0.14.1/zig-macos-aarch64-0.14.1.tar.xz | tar xJ
          echo "$PWD/zig-macos-aarch64-0.14.1" >> $GITHUB_PATH

      - name: Build libghostty
        run: cd ghostty && zig build -Doptimize=ReleaseFast

      - name: Copy GhosttyKit.xcframework
        run: cp -R ghostty/zig-out/lib/GhosttyKit.xcframework .

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build release
        run: xcodebuild -project Calyx.xcodeproj -scheme Calyx -configuration Release CODE_SIGN_IDENTITY="Developer ID Application" CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=PQQBSRKD72 build

      - name: Notarize
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Calyx.app" -path "*/Release/*" | head -1)
          ditto -c -k --keepParent "$APP_PATH" /tmp/Calyx.zip
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY" > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          xcrun notarytool submit /tmp/Calyx.zip --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" /tmp/Calyx.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} /tmp/Calyx.zip --title "Calyx ${{ github.ref_name }}" --generate-notes
